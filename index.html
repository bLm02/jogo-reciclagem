<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♻️ Jogo de Reciclagem - 10 Rodadas</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }

        body{
            background:url('images/backgroud/fundo-jogo.jpg');
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .game-container{
            background:#f0f7e6;
            border-radius:50px;
            padding:30px;
            box-shadow:0 20px 40px rgba(0,0,0,0.3);
            max-width:1000px;
            width:100%;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            background:#2d5a5e;
            padding:20px 30px;
            border-radius:40px;
            color:white;
        }

        .round-info{
            font-size:24px;
            font-weight:bold;
            background:#ffb347;
            padding:10px 25px;
            border-radius:30px;
            color:#1e3c3f;
        }

        .score-info{
            font-size:28px;
            font-weight:bold;
            background:#ff6f61;
            padding:10px 25px;
            border-radius:30px;
        }

        .attempts-info{
            font-size:20px;
            background:#4a8b8f;
            padding:10px 25px;
            border-radius:30px;
        }

        .lixeira-section{
            background:#d9e6d9;
            border-radius:40px;
            padding:30px;
            margin-bottom:30px;
            text-align:center;
        }

        .lixeira-title{
            font-size:20px;
            color:#1e3c3f;
            margin-bottom:15px;
            font-weight:bold;
        }

        .lixeira-card{
            background:white;
            padding:30px;
            border-radius:30px;
            display:inline-block;
            min-width:250px;
            box-shadow:0 10px 20px rgba(0,0,0,0.1);
            border:4px solid;
            cursor:pointer;
            transition:transform 0.3s;
        }

        .lixeira-card:hover{
            transform:scale(1.02);
        }

        .lixeira-icon{
            margin-bottom:15px;
        }

        .lixeira-icon img{
            width:80px;
            height:80px;
            object-fit:contain;
        }

        .lixeira-nome{
            font-size:28px;
            font-weight:bold;
            margin-bottom:5px;
        }

        .lixeira-categoria{
            font-size:18px;
            color:#666;
        }

        .itens-section{
            margin-bottom:30px;
        }

        .itens-grid{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
            margin-top:20px;
        }

        .item-card{
            background:white;
            border-radius:30px;
            padding:20px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            cursor:grab;
            transition:all 0.3s;
            border:3px solid #4a8b8f;
            user-select:none;
        }

        .item-card:hover{
            transform:scale(1.05);
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .item-icon{
            font-size:50px;
            margin-bottom:10px;
        }

        .item-nome{
            font-size:18px;
            font-weight:bold;
            color:#1e3c3f;
            margin-bottom:5px;
        }

        .item-categoria{
            font-size:14px;
            color:#666;
            background:#f0f0f0;
            display:inline-block;
            padding:5px 15px;
            border-radius:20px;
        }

        .message-area{
            background:#ffb347;
            border-radius:30px;
            padding:20px;
            margin:20px 0;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            color:#1e3c3f;
            min-height:80px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .next-round-btn{
            background:#2d5a5e;
            color:white;
            border:none;
            padding:20px 40px;
            font-size:24px;
            font-weight:bold;
            border-radius:40px;
            cursor:pointer;
            width:100%;
            display:none;
        }

        .reset-btn{
            background:#ff6f61;
            color:white;
            border:none;
            padding:15px 30px;
            font-size:20px;
            font-weight:bold;
            border-radius:30px;
            cursor:pointer;
            margin-top:20px;
        }

        .final-score{
            text-align:center;
            padding:40px;
            background:white;
            border-radius:40px;
        }

        .hidden{
            display:none !important;
        }

        .drag-over{
            background:#e0f0e0 !important;
            border-color:#4CAF50 !important;
        }

    </style>
</head>

<body>

<div class="game-container">

    <div class="header">
        <div class="round-info" id="roundDisplay">Rodada 1/10</div>
        <div class="score-info" id="scoreDisplay">0 pts</div>
        <div class="attempts-info" id="attemptsDisplay">1ª tentativa: 10 pts</div>
    </div>

    <div id="gameArea">

        <div class="lixeira-section">
            <div class="lixeira-title">Arraste um item para a lixeira:</div>

            <div class="lixeira-card" id="lixeiraAtual">

                <div class="lixeira-icon" id="lixeiraIcon"></div>

                <div class="lixeira-nome" id="lixeiraNome">Carregando...</div>

                <div class="lixeira-categoria" id="lixeiraCategoria"></div>

            </div>
        </div>

        <div class="itens-section">

            <h3 style="color:#1e3c3f;margin-bottom:15px;">
                Escolha um item para reciclar:
            </h3>

            <div class="itens-grid" id="itensGrid"></div>

        </div>

        <div class="message-area" id="messageArea">
            Arraste um item para a lixeira
        </div>

        <button class="next-round-btn" id="nextRoundBtn" onclick="proximaRodada()">
            ▶️ PRÓXIMA RODADA
        </button>

    </div>

    <div id="finalScoreArea" class="final-score hidden">

        <h2>🎮 FIM DE JOGO 🎮</h2>

        <p id="finalScoreDisplay">0</p>

        <button class="reset-btn" onclick="reiniciarJogo()">
            🔄 JOGAR NOVAMENTE
        </button>

    </div>

</div>

<script>

    let todasLixeiras=[];
    let todosItens=[];
    let itensRestantes=[];
    let lixeiraAtual=null;

    let pontuacao=0;
    let rodadaAtual=0;

    const TOTAL_RODADAS=10;

    let tentativasRodada=0;
    let acertouRodada=false;

    const valoresPontuacao=[10,5,2,0];

    const roundDisplay=document.getElementById('roundDisplay');
    const scoreDisplay=document.getElementById('scoreDisplay');
    const attemptsDisplay=document.getElementById('attemptsDisplay');

    const lixeiraNome=document.getElementById('lixeiraNome');
    const lixeiraIcon=document.getElementById('lixeiraIcon');
    const lixeiraCategoria=document.getElementById('lixeiraCategoria');

    const itensGrid=document.getElementById('itensGrid');
    const messageArea=document.getElementById('messageArea');

    const nextRoundBtn=document.getElementById('nextRoundBtn');
    const lixeiraCard=document.getElementById('lixeiraAtual');

    const finalScoreArea=document.getElementById('finalScoreArea');
    const finalScoreDisplay=document.getElementById('finalScoreDisplay');

    const itemIcons={
        plastico:'🧴',
        papel:'📰',
        metal:'🥫',
        vidro:'🍾',
        organico:'🍌',
        default:'📦'
    };

    const lixeiraIcons={
        azul:"<img src='images/lixeiras/Papel.jpeg'>",
        vermelho:"<img src='images/lixeiras/Plástico.jpeg'>",
        amarelo:"<img src='images/lixeiras/Metal.jpeg'>",
        verde:"<img src='images/lixeiras/Vidro.jpeg'>",
        marrom:"<img src='images/lixeiras/Orgânico.jpeg'>"
    };

    async function carregarDados(){

        const responseLixeiras=await fetch('http://localhost:8080/api/lixeiras');
        todasLixeiras=await responseLixeiras.json();

        const responseItens=await fetch('http://localhost:8080/api/itens');
        todosItens=await responseItens.json();

        reiniciarJogo();

    }

    function reiniciarJogo(){

        pontuacao=0;
        rodadaAtual=0;

        novaRodada();

    }

    function novaRodada(){

        if(rodadaAtual>=TOTAL_RODADAS){

            finalizarJogo();
            return;

        }

        rodadaAtual++;
        tentativasRodada=0;
        acertouRodada=false;

        const indice=Math.floor(Math.random()*todasLixeiras.length);
        lixeiraAtual=todasLixeiras[indice];

        lixeiraNome.textContent=lixeiraAtual.nome;

        /* CORREÇÃO PRINCIPAL */

        lixeiraIcon.innerHTML=lixeiraIcons[lixeiraAtual.cor] || "🗑️";

        lixeiraCategoria.textContent=`Aceita: ${lixeiraAtual.categoriaAceita}`;

        itensRestantes=[...todosItens].sort(()=>Math.random()-0.5).slice(0,4);

        atualizarDisplay();

    }

    function atualizarDisplay(){

        roundDisplay.textContent=`Rodada ${rodadaAtual}/${TOTAL_RODADAS}`;

        itensGrid.innerHTML='';

        itensRestantes.forEach(item=>{

            const card=document.createElement('div');
            card.className='item-card';
            card.draggable=true;

            card.innerHTML=`
<div class="item-icon">${itemIcons[item.categoria]}</div>
<div class="item-nome">${item.nome}</div>
<div class="item-categoria">${item.categoria}</div>
`;

            card.addEventListener('dragstart',e=>{
                e.dataTransfer.setData('id',item.id);
            });

            itensGrid.appendChild(card);

        });

    }

    lixeiraCard.addEventListener('dragover',e=>{
        e.preventDefault();
    });

    lixeiraCard.addEventListener('drop',e=>{

        const id=e.dataTransfer.getData('id');

        processarJogada(parseInt(id));

    });

    async function processarJogada(id){

        const item=todosItens.find(i=>i.id===id);

        if(item.categoria===lixeiraAtual.categoriaAceita){

            pontuacao+=valoresPontuacao[tentativasRodada];

            messageArea.innerHTML="🎉 ACERTOU!";

            nextRoundBtn.style.display="block";

            acertouRodada=true;

            scoreDisplay.textContent=`${pontuacao} pts`;

        }else{

            tentativasRodada++;

            messageArea.innerHTML="❌ ERROU!";

        }

    }

    function proximaRodada(){

        nextRoundBtn.style.display="none";

        novaRodada();

    }

    function finalizarJogo(){

        document.getElementById('gameArea').classList.add('hidden');

        finalScoreArea.classList.remove('hidden');

        finalScoreDisplay.textContent=pontuacao;

    }

    window.onload=carregarDados;

</script>

</body>
</html>
